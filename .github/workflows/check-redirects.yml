name: Check Redirects

on:
  pull_request:
    branches:
      - develop
      - master
    paths:
      - 'src/pages/**'
      - 'src/templates/**'
      - 'src/redirects.ts'

jobs:
  check-redirects:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Check for renamed/deleted pages without redirects
        run: node bin/check-redirects.js
        env:
          BASE_REF: ${{ github.base_ref }}
